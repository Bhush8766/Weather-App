<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App Pro</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#5f2c82,#49a09d);
}

.app{
    width:350px;
    height:650px;
    border-radius:30px;
    overflow:hidden;
    position:relative;
    background:linear-gradient(180deg,#1f2c5c,#8e44ad);
    color:white;
}

/* Screens */
.screen{
    position:absolute;
    width:100%;
    height:100%;
    padding:25px;
    transition:0.5s;
}

.hidden{
    transform:translateX(100%);
}

/* ------------------ SCREEN 1 ------------------ */
.start{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.logo{
    font-size:60px;
    color:#f1c40f;
    margin-bottom:10px;
}

.start h1{
    font-size:34px;
}

.start span{
    color:#f1c40f;
}

.btn{
    margin-top:25px;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#f1c40f;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

/* ------------------ SCREEN 2 ------------------ */
.search{
    text-align:center;
    margin-top:100px;
}

/* Search Box like your image */
.search-box{
    display:flex;
    align-items:center;
    background:rgba(255,255,255,0.15);
    border-radius:30px;
    padding:10px 15px;
    backdrop-filter: blur(10px);
}

.search-box i{
    margin-right:10px;
    color:#f1c40f;
}

.search-box input{
    border:none;
    outline:none;
    background:transparent;
    color:white;
    width:100%;
}

/* ------------------ SCREEN 3 ------------------ */
.weather{
    text-align:center;
}

.temp{
    font-size:70px;
    font-weight:bold;
}

#weatherIcon{
    font-size:60px;
    margin-top:10px;
    color:#f1c40f;
}

.glass-card{
    margin-top:15px;
    padding:15px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
}

.forecast{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
}

.day{
    background:rgba(255,255,255,0.1);
    padding:10px;
    border-radius:15px;
    width:60px;
}

.info-grid{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.info-box{
    flex:1;
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:15px;
}
</style>
</head>

<body>

<div class="app">

    <!-- SCREEN 1 -->
    <div class="screen start" id="screen1">
        <div class="logo">
            <img src="./3d-weather-icon-day-with-rain-free-png.png" alt="" style="width: 250px;">
        </div>
        <h1>Weather <span>Forecasts</span></h1>
        <button class="btn" onclick="goToSearch()">Get Start</button>
    </div>

    <!-- SCREEN 2 -->
    <div class="screen search hidden" id="screen2">
        
        <h2 style="margin-bottom: 10px;">Search City</h2>

        <div class="search-box ">
            <i class="fa fa-search"></i>
            <input type="text" id="city" placeholder="Search location...">
        </div>

        <button class="btn" style="margin-right: 3px;" onclick="getWeather()">Get Weather</button>

        <button class="btn" style="margin-left: 3px;" onclick="goHome()">Back to Home</button>

        <div class="logo">
            <img src="./logo2.png" alt="" style="width: 250px; margin-top: 50px;">
        </div>
    </div>

    <!-- SCREEN 3 -->
    <div class="screen weather hidden" id="screen3">

        <h3 id="cityName">City</h3>

        <div id="weatherIcon"></div>

        <h1 class="temp" id="temp">--°</h1>
        <p id="desc">---</p>

        <div class="glass-card">
            <p>Max: <span id="maxTemp"></span>°</p>
            <p>Min: <span id="minTemp"></span>°</p>
        </div>

        <div class="forecast">
            <div class="day"><p>Mon</p><span>--°</span></div>
            <div class="day"><p>Tue</p><span>--°</span></div>
            <div class="day"><p>Wed</p><span>--°</span></div>
            <div class="day"><p>Thu</p><span>--°</span></div>
        </div>

        <div class="info-grid">
            <div class="info-box">
                <p><i class="fa fa-droplet"></i> Humidity</p>
                <h4 id="humidity"></h4>
            </div>
            <div class="info-box">
                <p><i class="fa fa-wind"></i> Wind</p>
                <h4 id="wind"></h4>
            </div>
        </div>

        <button class="btn" onclick="goBack()">Search Again</button>

    </div>

</div>

<script>

function goToSearch(){
    screen1.classList.add("hidden");
    screen2.classList.remove("hidden");
}

function goBack(){
    screen3.classList.add("hidden");
    screen2.classList.remove("hidden");
}


function goHome(){
    screen2.classList.add("hidden");
    screen1.classList.remove("hidden");
}


async function getWeather(){

    const city = document.getElementById("city").value;

    if(city===""){
        alert("Enter city");
        return;
    }

    const apiKey = "https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=ca018df54353f065aaed7d802825b8be";

    const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=ca018df54353f065aaed7d802825b8be`;

    try{
        const res = await fetch(url);
        const data = await res.json();

        if(data.cod !== 200){
            alert("City not found");
            return;
        }

        cityName.innerText = data.name;
        temp.innerText = Math.round(data.main.temp)+"°";
        desc.innerText = data.weather[0].main;

        maxTemp.innerText = Math.round(data.main.temp_max);
        minTemp.innerText = Math.round(data.main.temp_min);

        humidity.innerText = data.main.humidity+"%";
        wind.innerText = data.wind.speed+" km/h";

        // ICON LOGIC
        const condition = data.weather[0].main.toLowerCase();
        let icon="";

        if(condition.includes("cloud")){
            icon='<i class="fa-solid fa-cloud"></i>';
        }
        else if(condition.includes("rain")){
            icon='<i class="fa-solid fa-cloud-rain"></i>';
        }
        else if(condition.includes("clear")){
            icon='<i class="fa-solid fa-sun"></i>';
        }
        else if(condition.includes("snow")){
            icon='<i class="fa-solid fa-snowflake"></i>';
        }
        else{
            icon='<i class="fa-solid fa-cloud-sun"></i>';
        }

        weatherIcon.innerHTML = icon;

        screen2.classList.add("hidden");
        screen3.classList.remove("hidden");

    }catch{
        alert("Error");
    }
}

</script>

</body>
</html>
